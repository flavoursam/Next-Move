{% extends "base.html" %}
{% block title %}Who are you? — NextMove{% endblock %}
{% block content %}
<div class="identity-wrap">
  <h1 class="page-title">Who are you?</h1>
  <p style="color: var(--muted); margin-bottom: 24px; font-size: 13px;">
    Pick your name to get started. Your leads and commission are tracked under this name.
  </p>

  {% if users %}
  <div class="identity-options">
    {% for u in users %}
    <form method="POST" action="/identity">
      <input type="hidden" name="name" value="{{ u.name }}">
      <button type="submit" class="btn btn-secondary">{{ u.name }}</button>
    </form>
    {% endfor %}
  </div>
  <p style="font-size: 12px; color: var(--muted); margin-bottom: 12px;">Or add yourself:</p>
  {% endif %}

  <form method="POST" action="/identity">
    <div class="form-group">
      <input type="text" name="name" placeholder="Your name" required {% if not users %}autofocus{% endif %}>
    </div>
    <button type="submit" class="btn btn-primary">Continue</button>
  </form>
</div>
{% endblock %}

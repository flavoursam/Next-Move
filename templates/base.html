<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NextMove{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/">NextMove</a>
    <div class="nav-links">
      <a href="/accounts">Accounts</a>
      <a href="/">Sequences</a>
<a href="/accounts/new" class="btn btn-cta">+ Track Account</a>
    </div>
    {% if user %}
    <div class="nav-user">{{ user.name }}</div>
    {% endif %}
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <script>
    document.addEventListener('submit', function(e) {
      var form = e.target;
      var btn = form.querySelector('button[type="submit"], button:not([type])');
      if (!btn || btn.dataset.noLoading) return;
      btn.disabled = true;
      var spinner = document.createElement('span');
      spinner.className = 'spinner';
      spinner.style.cssText = 'width:13px;height:13px;border-width:2px;margin-right:6px;vertical-align:middle;';
      btn.insertBefore(spinner, btn.firstChild);
    });
  </script>
</body>
</html>

{% extends "base.html" %}
{% block title %}New Sequence — NextMove{% endblock %}
{% block content %}

<div style="max-width: 520px;">
  <div class="breadcrumb">
    <a href="/">Dashboard</a>
    <span class="breadcrumb-sep">/</span>
    <span>New Sequence</span>
  </div>

  <h1 class="page-title">New Sequence</h1>

  <div class="card">
    <form method="POST" action="/sequence/new">
      <div class="form-group">
        <label class="form-label">Close Lead ID</label>
        <input type="text" name="lead_id" placeholder="lead_abc123XYZetc" required autofocus>
        <p class="form-hint">
          Find it in the Close URL: <code>app.close.com/lead/<strong>lead_abc123...</strong>/</code>
        </p>
      </div>

      <div class="form-group">
        <label class="form-label">Vertical</label>
        <select name="vertical">
          <option value="tourism">Tourism</option>
        </select>
      </div>

      <div class="form-group" style="background: #fef9ec; border: 1px solid #fcd34d; border-radius: 6px; padding: 14px 16px;">
        <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; margin: 0;">
          <input
            type="checkbox"
            name="commission_agreed"
            value="1"
            style="width: auto; margin-top: 3px; flex-shrink: 0;"
          >
          <span style="font-size: 13px; line-height: 1.5;">
            I agree that <strong>the app owner</strong> receives <strong>10% commission</strong>
            on any deal that results from running NextMove on this lead.
            This is a condition of using this tool.
          </span>
        </label>
      </div>

      <div style="display: flex; align-items: center; gap: 12px;">
        <button type="submit" class="btn btn-primary">Run NextMove</button>
        <span class="meta">~30 seconds — you'll be redirected automatically</span>
      </div>
    </form>
  </div>
</div>

{% endblock %}
